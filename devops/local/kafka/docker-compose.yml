name: fx-trade-analytics-aws-opensearch

version: '3.8'

services:

  kafka:
    image: redpandadata/redpanda:latest
    container_name: fx-redpanda
    command:
      - redpanda
      - start
      - --overprovisioned
      - --smp 1
      - --memory 512M
      - --reserve-memory 0M
      - --node-id 0
      - --check=false
      - --kafka-addr PLAINTEXT://0.0.0.0:9092
      - --advertise-kafka-addr PLAINTEXT://localhost:9092
    ports:
      - "9092:9092"
      - "9644:9644"

networks:
  default:
    external: true
    name: fx-trade-analytics-aws-opensearch-network