name: 004-AWS-Setup-Region-OpenSearch

# Provisions one AWS OpenSearch domain per selected region.
# Idempotent: skips regions where a CFN stack OR a same-named OpenSearch domain
# already exists (logs a message and continues).
#
# Manual button in Actions tab. Also callable from 995-AWS-All-Setup.

on:
  workflow_dispatch:
    inputs:
      regions:
        description: 'Comma-separated AWS regions to provision domains in. Available: us-east-1 (N.Virginia), us-west-2 (Oregon), sa-east-1 (São Paulo), eu-west-2 (London), eu-central-1 (Frankfurt), ap-south-1 (Mumbai), ap-southeast-1 (Singapore), ap-northeast-1 (Tokyo). Ignored when "select_all_regions" is checked.'
        required: true
        default: 'us-east-1'
      select_all_regions:
        description: 'Check to deploy to all 8 demo regions: us-east-1, us-west-2, sa-east-1, eu-west-2, eu-central-1, ap-south-1, ap-southeast-1, ap-northeast-1. Overrides the regions field above.'
        required: false
        default: false
        type: boolean
      environment:
        description: 'Environment tag'
        required: true
        default: 'dev'
        type: choice
        options: [dev, stg, prod]
      instance_type:
        description: 'OpenSearch instance type'
        required: false
        default: 't3.small.search'
        type: choice
        options:
          - t3.small.search
          - t3.medium.search
          - r6g.large.search
          - r6g.xlarge.search
      instance_count:
        description: 'Number of nodes per domain (1 for dev)'
        required: false
        default: '1'
      ebs_volume_size_gb:
        description: 'EBS volume size per node (GB)'
        required: false
        default: '10'
      master_username:
        description: 'FGAC master username for OpenSearch Dashboards browser login'
        required: false
        default: 'fxadmin'
  workflow_call:
    inputs:
      regions:           { required: true,  type: string }
      select_all_regions: { required: false, type: boolean, default: false }
      environment:       { required: true,  type: string }
      instance_type:     { required: false, type: string, default: 't3.small.search' }
      instance_count:    { required: false, type: string, default: '1' }
      ebs_volume_size_gb: { required: false, type: string, default: '10' }
      master_username:   { required: false, type: string, default: 'fxadmin' }

permissions:
  contents: read

jobs:
  # Step 1: parse the regions input into a JSON array for the matrix.
  parse-regions:
    runs-on: ubuntu-latest
    outputs:
      regions_json: ${{ steps.parse.outputs.regions_json }}
    steps:
      - id: parse
        run: |
          set -euo pipefail
          ALL='us-east-1,us-west-2,sa-east-1,eu-west-2,eu-central-1,ap-south-1,ap-southeast-1,ap-northeast-1'
          # The select_all_regions checkbox wins over the regions text field.
          # We also still accept the literal token "all" in the regions field
          # for backward compatibility with anyone who typed it.
          if [ "${{ inputs.select_all_regions }}" = "true" ]; then
            INPUT="$ALL"
            echo "::notice::select_all_regions is checked — overriding regions input."
          elif [ "${{ inputs.regions }}" = "all" ]; then
            INPUT="$ALL"
          else
            INPUT='${{ inputs.regions }}'
          fi
          # Trim whitespace; convert comma list to JSON array
          ARR=$(echo "$INPUT" | tr ',' '\n' | sed 's/^[[:space:]]*//;s/[[:space:]]*$//' | grep . | jq -R . | jq -sc .)
          echo "Selected regions: $ARR"
          echo "regions_json=$ARR" >> "$GITHUB_OUTPUT"

  # Step 2: per-region matrix. Each region runs in parallel.
  setup-region:
    needs: parse-regions
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        region: ${{ fromJson(needs.parse-regions.outputs.regions_json) }}
    env:
      STACK_NAME: fx-${{ inputs.environment }}-opensearch-${{ matrix.region }}
      DOMAIN_NAME: fxs-${{ inputs.environment }}-${{ matrix.region }}
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials for ${{ matrix.region }}
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ matrix.region }}

      - name: Skip-if-exists check + auto-recover failed stacks
        id: precheck
        run: |
          set -euo pipefail
          STATE="create"
          if aws cloudformation describe-stacks --stack-name "$STACK_NAME" --region "${{ matrix.region }}" >/dev/null 2>&1; then
            STACK_STATUS=$(aws cloudformation describe-stacks \
              --stack-name "$STACK_NAME" --region "${{ matrix.region }}" \
              --query 'Stacks[0].StackStatus' --output text)
            case "$STACK_STATUS" in
              ROLLBACK_COMPLETE|ROLLBACK_FAILED|CREATE_FAILED|DELETE_FAILED|UPDATE_ROLLBACK_FAILED)
                echo "::warning::Stack $STACK_NAME is in $STACK_STATUS state in ${{ matrix.region }} — auto-deleting so we can re-create cleanly."
                aws cloudformation delete-stack --stack-name "$STACK_NAME" --region "${{ matrix.region }}"
                aws cloudformation wait stack-delete-complete --stack-name "$STACK_NAME" --region "${{ matrix.region }}"
                echo "::notice::Failed stack deleted; will create fresh."
                STATE="create"
                ;;
              CREATE_COMPLETE|UPDATE_COMPLETE|UPDATE_ROLLBACK_COMPLETE)
                echo "::notice::Stack $STACK_NAME exists in $STACK_STATUS state in ${{ matrix.region }}; will run an idempotent update (no-fail-on-empty-changeset)."
                STATE="update"
                ;;
              *_IN_PROGRESS)
                echo "::error::Stack $STACK_NAME is in transitional state $STACK_STATUS — another deploy is mid-flight. Wait for it to finish, then re-run."
                exit 1
                ;;
              *)
                echo "::error::Stack $STACK_NAME is in unexpected state $STACK_STATUS. Inspect in the AWS Console before re-running."
                exit 1
                ;;
            esac
          elif aws opensearch describe-domain --domain-name "$DOMAIN_NAME" --region "${{ matrix.region }}" >/dev/null 2>&1; then
            echo "::warning::Domain $DOMAIN_NAME exists in ${{ matrix.region }} but is NOT managed by our CFN stack ($STACK_NAME). Skipping to avoid conflict. Manage it manually or delete it and re-run."
            STATE="skip"
          fi
          echo "state=$STATE" >> "$GITHUB_OUTPUT"

      - name: Validate FGAC password secret is set
        if: steps.precheck.outputs.state != 'skip'
        env:
          MASTER_PASSWORD: ${{ secrets.OPENSEARCH_MASTER_PASSWORD }}
        run: |
          if [ -z "$MASTER_PASSWORD" ]; then
            echo "::error::OPENSEARCH_MASTER_PASSWORD repo secret is not set."
            echo "::error::Add it under Settings → Secrets and variables → Actions."
            echo "::error::AWS requires 8–128 chars, with at least one upper, lower, number, and special character."
            exit 1
          fi

      - name: Deploy OpenSearch stack in ${{ matrix.region }}
        if: steps.precheck.outputs.state != 'skip'
        env:
          # Mapped to env to keep it off the command line; --parameter-overrides
          # would otherwise include the value in 'ps' output / process listings
          # on the runner. GitHub Actions auto-masks secrets in logs anyway,
          # but defense in depth.
          MASTER_PASSWORD: ${{ secrets.OPENSEARCH_MASTER_PASSWORD }}
        run: |
          set -euo pipefail
          aws cloudformation deploy \
            --stack-name "$STACK_NAME" \
            --region "${{ matrix.region }}" \
            --template-file .github/aws/cloudformation/region-opensearch.yml \
            --parameter-overrides \
              Environment=${{ inputs.environment }} \
              RegionCode=${{ matrix.region }} \
              InstanceType=${{ inputs.instance_type }} \
              InstanceCount=${{ inputs.instance_count }} \
              EbsVolumeSizeGB=${{ inputs.ebs_volume_size_gb }} \
              MasterUsername=${{ inputs.master_username }} \
              MasterPassword="$MASTER_PASSWORD" \
            --no-fail-on-empty-changeset \
            --tags Project=fx-trade-analytics Environment=${{ inputs.environment }} Region=${{ matrix.region }}

      - name: Show stack outputs
        if: steps.precheck.outputs.state != 'skip'
        run: |
          aws cloudformation describe-stacks \
            --stack-name "$STACK_NAME" \
            --region "${{ matrix.region }}" \
            --query 'Stacks[0].Outputs' --output table
