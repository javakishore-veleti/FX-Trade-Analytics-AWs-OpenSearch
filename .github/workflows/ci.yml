name: Middleware CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:

  build-middleware:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build Entire Middleware
        run: mvn -B -f middleware/pom.xml clean install

  build-modules-independently:
    runs-on: ubuntu-latest
    needs: build-middleware

    strategy:
      matrix:
        module:
          - fx-common
          - fx-trade-service
          - fx-opensearch-indexer
          - fx-trade-simulator

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build fx-common first
        run: mvn -B -f middleware/fx-common/pom.xml clean install || true

      - name: Build Module
        run: |
          if [ -f middleware/${{ matrix.module }}/pom.xml ]; then
            mvn -B -f middleware/${{ matrix.module }}/pom.xml clean install
          else
            echo "Module ${{ matrix.module }} not present yet"
          fi
