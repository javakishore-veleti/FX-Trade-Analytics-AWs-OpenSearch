name: 001-AWS-Initial-Setup-VPC

# Provisions VPCs across one or more AWS regions. For any region listed in
# `vpc_overrides_json` the workflow records the user-supplied VPC id and
# skips creation. For all other selected regions a fresh VPC is created via
# the same CloudFormation template.
#
# Manual button in the Actions tab. Also callable from 995-AWS-All-Setup.

on:
  workflow_dispatch:
    inputs:
      regions:
        description: 'Comma-separated AWS regions to create VPCs in. Available: us-east-1 (N.Virginia), us-west-2 (Oregon), sa-east-1 (São Paulo), eu-west-2 (London), eu-central-1 (Frankfurt), ap-south-1 (Mumbai), ap-southeast-1 (Singapore), ap-northeast-1 (Tokyo). Ignored when "select_all_regions" is checked.'
        required: true
        default: 'us-east-1'
      select_all_regions:
        description: 'Check to provision all 8 demo regions: us-east-1, us-west-2, sa-east-1, eu-west-2, eu-central-1, ap-south-1, ap-southeast-1, ap-northeast-1. Overrides the regions field above.'
        required: false
        default: false
        type: boolean
      environment:
        description: 'Environment tag'
        required: true
        default: 'dev'
        type: choice
        options: [dev, stg, prod]
      vpc_overrides_json:
        description: 'JSON map of region -> existing VPC id (skips create for those). Example: {"us-east-1":"vpc-abc123","eu-west-1":"vpc-def456"}'
        required: false
        default: '{}'
      vpc_cidr:
        description: 'CIDR for newly created VPCs (regions in overrides ignore this)'
        required: false
        default: '10.0.0.0/16'
      create_nat_gateway:
        description: 'Create a NAT gateway per new VPC (~$32/mo each)?'
        required: false
        default: 'true'
        type: choice
        options: ['true', 'false']
  workflow_call:
    inputs:
      regions:            { required: true,  type: string }
      select_all_regions: { required: false, type: boolean, default: false }
      environment:        { required: true,  type: string }
      vpc_overrides_json: { required: false, type: string, default: '{}' }
      vpc_cidr:           { required: false, type: string, default: '10.0.0.0/16' }
      create_nat_gateway: { required: false, type: string, default: 'true' }

permissions:
  contents: read

jobs:
  parse-regions:
    runs-on: ubuntu-latest
    outputs:
      regions_json: ${{ steps.parse.outputs.regions_json }}
    steps:
      - id: parse
        run: |
          set -euo pipefail
          ALL='us-east-1,us-west-2,sa-east-1,eu-west-2,eu-central-1,ap-south-1,ap-southeast-1,ap-northeast-1'
          if [ "${{ inputs.select_all_regions }}" = "true" ]; then
            INPUT="$ALL"
            echo "::notice::select_all_regions is checked — overriding regions input."
          elif [ "${{ inputs.regions }}" = "all" ]; then
            INPUT="$ALL"
          else
            INPUT='${{ inputs.regions }}'
          fi
          ARR=$(echo "$INPUT" | tr ',' '\n' | sed 's/^[[:space:]]*//;s/[[:space:]]*$//' | grep . | jq -R . | jq -sc .)
          echo "Selected regions: $ARR"
          # Validate the override JSON parses cleanly
          echo '${{ inputs.vpc_overrides_json }}' | jq empty
          echo "regions_json=$ARR" >> "$GITHUB_OUTPUT"

  vpc:
    needs: parse-regions
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        region: ${{ fromJson(needs.parse-regions.outputs.regions_json) }}
    env:
      STACK_NAME: fx-${{ inputs.environment }}-vpc
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials for ${{ matrix.region }}
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ matrix.region }}

      - name: Resolve override for ${{ matrix.region }}
        id: lookup
        run: |
          set -euo pipefail
          OVR=$(echo '${{ inputs.vpc_overrides_json }}' | jq -r --arg r '${{ matrix.region }}' '.[$r] // ""')
          echo "override=$OVR" >> "$GITHUB_OUTPUT"
          if [ -n "$OVR" ]; then
            echo "::notice::Region ${{ matrix.region }} will reuse existing VPC $OVR (no stack created)."
          fi

      - name: Reuse existing VPC (skip stack)
        if: steps.lookup.outputs.override != ''
        run: |
          aws ec2 describe-vpcs --vpc-ids "${{ steps.lookup.outputs.override }}" --region "${{ matrix.region }}" \
            --query 'Vpcs[0].{Id:VpcId,Cidr:CidrBlock,State:State}' --output table

      - name: Auto-recover failed CFN stack (if any) before re-creating
        if: steps.lookup.outputs.override == ''
        run: |
          set -euo pipefail
          if aws cloudformation describe-stacks --stack-name "$STACK_NAME" --region "${{ matrix.region }}" >/dev/null 2>&1; then
            STACK_STATUS=$(aws cloudformation describe-stacks \
              --stack-name "$STACK_NAME" --region "${{ matrix.region }}" \
              --query 'Stacks[0].StackStatus' --output text)
            case "$STACK_STATUS" in
              ROLLBACK_COMPLETE|ROLLBACK_FAILED|CREATE_FAILED|DELETE_FAILED|UPDATE_ROLLBACK_FAILED)
                echo "::warning::Stack $STACK_NAME is in $STACK_STATUS state in ${{ matrix.region }} — auto-deleting so we can re-create cleanly."
                aws cloudformation delete-stack --stack-name "$STACK_NAME" --region "${{ matrix.region }}"
                aws cloudformation wait stack-delete-complete --stack-name "$STACK_NAME" --region "${{ matrix.region }}"
                echo "::notice::Failed stack deleted; will create fresh."
                ;;
              CREATE_COMPLETE|UPDATE_COMPLETE|UPDATE_ROLLBACK_COMPLETE)
                echo "::notice::Stack $STACK_NAME exists in $STACK_STATUS state in ${{ matrix.region }}; will run an idempotent update."
                ;;
              *_IN_PROGRESS)
                echo "::error::Stack $STACK_NAME is in transitional state $STACK_STATUS — another deploy is mid-flight. Wait, then re-run."
                exit 1
                ;;
              *)
                echo "::error::Stack $STACK_NAME is in unexpected state $STACK_STATUS. Inspect in the AWS Console before re-running."
                exit 1
                ;;
            esac
          fi

      - name: Deploy VPC stack in ${{ matrix.region }}
        if: steps.lookup.outputs.override == ''
        run: |
          set -euo pipefail
          aws cloudformation deploy \
            --stack-name "$STACK_NAME" \
            --region "${{ matrix.region }}" \
            --template-file .github/aws/cloudformation/vpc.yml \
            --parameter-overrides \
              Environment=${{ inputs.environment }} \
              VpcCidr=${{ inputs.vpc_cidr }} \
              CreateNatGateway=${{ inputs.create_nat_gateway }} \
            --no-fail-on-empty-changeset \
            --tags Project=fx-trade-analytics Environment=${{ inputs.environment }} Region=${{ matrix.region }}

      - name: Show stack outputs
        if: steps.lookup.outputs.override == ''
        run: |
          aws cloudformation describe-stacks --stack-name "$STACK_NAME" --region "${{ matrix.region }}" \
            --query 'Stacks[0].Outputs' --output table
