name: fx-trade-analytics-aws-opensearch

services:
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: fx-kafka-ui
    # Host port 8085. Container's internal port stays 8080 — that's what the
    # provectuslabs/kafka-ui image listens on inside the container, unrelated
    # to fx-trade-service which now runs on host port 9080.
    ports:
      - "8085:8080"
    environment:
      DYNAMIC_CONFIG_ENABLED: "true"
      KAFKA_CLUSTERS_0_NAME: fx-local
      # In-Docker listener — Confluent broker advertises kafka:29092 internally.
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092

networks:
  default:
    external: true
    name: fx-trade-analytics-aws-opensearch-network
