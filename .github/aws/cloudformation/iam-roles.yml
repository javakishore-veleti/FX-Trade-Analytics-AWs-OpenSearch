AWSTemplateFormatVersion: '2010-09-09'
Description: |
  FX Trade Analytics — IAM roles for ECS task execution + per-service task
  roles. Task execution role is shared (pulls images, writes logs);
  per-service roles get tighter, app-specific permissions added later.

Parameters:
  Environment:
    Type: String
    Default: dev
    AllowedValues: [dev, stg, prod]

Resources:
  # Used by ECS to pull images from ECR and ship logs to CloudWatch.
  TaskExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub fx-${Environment}-ecs-task-exec
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal: { Service: ecs-tasks.amazonaws.com }
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AmazonECSTaskExecutionRolePolicy
      Tags:
        - Key: Environment
          Value: !Ref Environment

  # Per-service task roles. Each starts empty; service-specific policies
  # (S3, Secrets Manager, MSK, OpenSearch HTTP, etc.) are attached later.
  TradeServiceTaskRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub fx-${Environment}-trade-service-task
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal: { Service: ecs-tasks.amazonaws.com }
            Action: sts:AssumeRole
      Tags:
        - { Key: Environment, Value: !Ref Environment }
        - { Key: Service, Value: trade-service }

  RiskServiceTaskRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub fx-${Environment}-risk-service-task
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal: { Service: ecs-tasks.amazonaws.com }
            Action: sts:AssumeRole
      Tags:
        - { Key: Environment, Value: !Ref Environment }
        - { Key: Service, Value: risk-service }

  IndexerTaskRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub fx-${Environment}-indexer-task
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal: { Service: ecs-tasks.amazonaws.com }
            Action: sts:AssumeRole
      Tags:
        - { Key: Environment, Value: !Ref Environment }
        - { Key: Service, Value: opensearch-indexer }

  MasterDataTaskRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub fx-${Environment}-masterdata-task
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal: { Service: ecs-tasks.amazonaws.com }
            Action: sts:AssumeRole
      Tags:
        - { Key: Environment, Value: !Ref Environment }
        - { Key: Service, Value: masterdata }

Outputs:
  TaskExecutionRoleArn:
    Value: !GetAtt TaskExecutionRole.Arn
    Export:
      Name: !Sub "fx-${Environment}-ecs-task-exec-arn"
  TradeServiceTaskRoleArn:
    Value: !GetAtt TradeServiceTaskRole.Arn
    Export:
      Name: !Sub "fx-${Environment}-trade-service-task-arn"
  RiskServiceTaskRoleArn:
    Value: !GetAtt RiskServiceTaskRole.Arn
    Export:
      Name: !Sub "fx-${Environment}-risk-service-task-arn"
  IndexerTaskRoleArn:
    Value: !GetAtt IndexerTaskRole.Arn
    Export:
      Name: !Sub "fx-${Environment}-indexer-task-arn"
  MasterDataTaskRoleArn:
    Value: !GetAtt MasterDataTaskRole.Arn
    Export:
      Name: !Sub "fx-${Environment}-masterdata-task-arn"
