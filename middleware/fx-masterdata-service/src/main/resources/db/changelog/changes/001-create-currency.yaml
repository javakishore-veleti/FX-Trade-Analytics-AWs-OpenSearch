databaseChangeLog:
  - changeSet:
      id: 001-create-currency
      author: fx-team
      changes:
        - createTable:
            tableName: currency
            columns:
              - column:
                  name: code
                  type: VARCHAR(3)
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: name
                  type: VARCHAR(80)
                  constraints:
                    nullable: false
              - column:
                  name: country
                  type: VARCHAR(80)
              - column:
                  name: active
                  type: BOOLEAN
                  defaultValueBoolean: true
                  constraints:
                    nullable: false
