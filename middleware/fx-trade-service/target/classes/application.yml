
spring:
  kafka:
    bootstrap-servers: localhost:9092
    producer:
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: prometheus
  endpoint:
    prometheus:
      enabled: true

app:
  kafka:
    topic: trade-events

masterdata:
  base-url: http://localhost:8083
  allow-list:
    # When true, allow trades through if the master-data service is unreachable.
    # Flip to false in prod once masterdata is a hard dependency.
    fail-open: true
    refresh-interval-seconds: 300
