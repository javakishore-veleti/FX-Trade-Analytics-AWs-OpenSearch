name: 995-AWS-All-Setup

# Orchestrator: runs every 0XX-AWS-Initial-Setup-* workflow in order with the
# same shared inputs. Each step is a separate workflow run with its own logs.
#
# 001-VPC and 004-Region-OpenSearch are multi-region (per-region matrix
# inside each child workflow). 002-IAM-Roles is global; 003-ECR is single-
# region (deploys to the home region only — extend per service later).

on:
  workflow_dispatch:
    inputs:
      regions:
        description: 'Comma-separated AWS regions for VPC + OpenSearch. Available: us-east-1 (N.Virginia), us-west-2 (Oregon), sa-east-1 (São Paulo), eu-west-2 (London), eu-central-1 (Frankfurt), ap-south-1 (Mumbai), ap-southeast-1 (Singapore), ap-northeast-1 (Tokyo). Ignored when "select_all_regions" is checked.'
        required: true
        default: 'us-east-1'
      select_all_regions:
        description: 'Check to provision all 8 demo regions: us-east-1, us-west-2, sa-east-1, eu-west-2, eu-central-1, ap-south-1, ap-southeast-1, ap-northeast-1. Overrides the regions field above.'
        required: false
        default: false
        type: boolean
      home_region:
        description: 'Home region for global resources (IAM is global; ECR currently single-region)'
        required: true
        default: 'us-east-1'
      environment:
        description: 'Environment tag'
        required: true
        default: 'dev'
        type: choice
        options: [dev, stg, prod]
      vpc_overrides_json:
        description: 'JSON map of region -> existing VPC id (skips create for those)'
        required: false
        default: '{}'
      vpc_cidr:
        description: 'CIDR for new VPCs'
        required: false
        default: '10.0.0.0/16'
      create_nat_gateway:
        description: 'Create NAT gateway per new VPC?'
        required: false
        default: 'true'
        type: choice
        options: ['true', 'false']
      opensearch_instance_type:
        description: 'OpenSearch instance type (per region)'
        required: false
        default: 't3.small.search'
        type: choice
        options:
          - t3.small.search
          - t3.medium.search
          - r6g.large.search
          - r6g.xlarge.search

permissions:
  contents: read

jobs:
  vpc:
    uses: ./.github/workflows/001-AWS-Initial-Setup-VPC.yml
    secrets: inherit
    with:
      regions: ${{ inputs.regions }}
      select_all_regions: ${{ inputs.select_all_regions }}
      environment: ${{ inputs.environment }}
      vpc_overrides_json: ${{ inputs.vpc_overrides_json }}
      vpc_cidr: ${{ inputs.vpc_cidr }}
      create_nat_gateway: ${{ inputs.create_nat_gateway }}

  iam-roles:
    needs: vpc
    uses: ./.github/workflows/002-AWS-Initial-Setup-IAM-Roles.yml
    secrets: inherit
    with:
      aws_region: ${{ inputs.home_region }}
      environment: ${{ inputs.environment }}

  ecr:
    needs: iam-roles
    uses: ./.github/workflows/003-AWS-Initial-Setup-ECR.yml
    secrets: inherit
    with:
      aws_region: ${{ inputs.home_region }}
      environment: ${{ inputs.environment }}

  opensearch:
    needs: ecr
    uses: ./.github/workflows/004-AWS-Setup-Region-OpenSearch.yml
    secrets: inherit
    with:
      regions: ${{ inputs.regions }}
      select_all_regions: ${{ inputs.select_all_regions }}
      environment: ${{ inputs.environment }}
      instance_type: ${{ inputs.opensearch_instance_type }}
