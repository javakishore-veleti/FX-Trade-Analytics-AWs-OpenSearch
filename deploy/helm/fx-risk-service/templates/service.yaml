# Headless service that exposes only the actuator port. The risk service
# itself doesn't accept inbound HTTP traffic from other services — it consumes
# from Kafka — but Prometheus scraping and K8s probes still need this.
apiVersion: v1
kind: Service
metadata:
  name: {{ include "fx-risk-service.fullname" . }}
  labels: {{- include "fx-risk-service.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  selector: {{- include "fx-risk-service.selectorLabels" . | nindent 4 }}
  ports:
    - name: http
      port: {{ .Values.service.port }}
      targetPort: http
      protocol: TCP
