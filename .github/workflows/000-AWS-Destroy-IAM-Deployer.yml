name: 000-AWS-Destroy-IAM-Deployer

# Tears down the IAM resources created by 000-AWS-Bootstrap-IAM-Deployer.
# Uses the same BOOTSTRAP_AWS_* admin credentials (the deployer user can't
# delete itself).
#
# Order of operations (respects AWS deletion ordering):
#   1) Delete all access keys on the deployer user
#   2) Remove user from group
#   3) Delete user
#   4) Detach policy from group
#   5) Delete group
#   6) Delete all non-default policy versions
#   7) Delete the policy

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type DESTROY to confirm. Anything else aborts.'
        required: true
        default: ''
      policy_name:
        description: 'IAM policy name to delete'
        required: false
        default: 'fx-trade-opensearch-policy'
      group_name:
        description: 'IAM group name to delete'
        required: false
        default: 'fx-trade-opensearch-deployers'
      user_name:
        description: 'IAM user name to delete'
        required: false
        default: 'fx-trade-opensearch-github-deployer'
      aws_region:
        description: 'AWS region for the bootstrap CLI calls'
        required: false
        default: 'us-east-1'

permissions:
  contents: read

jobs:
  destroy:
    runs-on: ubuntu-latest
    env:
      POLICY_NAME: ${{ inputs.policy_name }}
      GROUP_NAME:  ${{ inputs.group_name }}
      USER_NAME:   ${{ inputs.user_name }}
    steps:
      - name: Verify confirmation token
        run: |
          if [ "${{ inputs.confirm }}" != "DESTROY" ]; then
            echo "::error::Refusing to run. Type DESTROY in the confirm input."
            exit 1
          fi

      - name: Verify bootstrap secrets are set
        env:
          BS_KEY_ID:     ${{ secrets.BOOTSTRAP_AWS_ACCESS_KEY_ID }}
          BS_SECRET_KEY: ${{ secrets.BOOTSTRAP_AWS_SECRET_ACCESS_KEY }}
        run: |
          if [ -z "$BS_KEY_ID" ] || [ -z "$BS_SECRET_KEY" ]; then
            echo "::error::BOOTSTRAP_AWS_ACCESS_KEY_ID / BOOTSTRAP_AWS_SECRET_ACCESS_KEY are not set."
            echo "::error::These admin credentials are needed to tear down the deployer user (which can't delete itself)."
            exit 1
          fi

      - name: Configure AWS credentials (bootstrap admin keys)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.BOOTSTRAP_AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.BOOTSTRAP_AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ inputs.aws_region }}

      - name: Resolve account id
        id: ident
        run: |
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          echo "account_id=$ACCOUNT_ID" >> "$GITHUB_OUTPUT"

      - name: Delete user's access keys + group membership + user
        run: |
          set -euo pipefail
          if aws iam get-user --user-name "$USER_NAME" >/dev/null 2>&1; then
            for KEY in $(aws iam list-access-keys --user-name "$USER_NAME" --query 'AccessKeyMetadata[*].AccessKeyId' --output text); do
              aws iam delete-access-key --user-name "$USER_NAME" --access-key-id "$KEY"
              echo "::notice::Deleted access key $KEY on user $USER_NAME."
            done
            # Remove user from group (silent if not in group)
            aws iam remove-user-from-group --user-name "$USER_NAME" --group-name "$GROUP_NAME" 2>/dev/null || true
            aws iam delete-user --user-name "$USER_NAME"
            echo "::notice::Deleted user $USER_NAME."
          else
            echo "::notice::User $USER_NAME does not exist; skipping."
          fi

      - name: Detach policy from group + delete group
        run: |
          set -euo pipefail
          POLICY_ARN="arn:aws:iam::${{ steps.ident.outputs.account_id }}:policy/$POLICY_NAME"
          if aws iam get-group --group-name "$GROUP_NAME" >/dev/null 2>&1; then
            aws iam detach-group-policy --group-name "$GROUP_NAME" --policy-arn "$POLICY_ARN" 2>/dev/null || true
            aws iam delete-group --group-name "$GROUP_NAME"
            echo "::notice::Deleted group $GROUP_NAME."
          else
            echo "::notice::Group $GROUP_NAME does not exist; skipping."
          fi

      - name: Delete policy (after pruning non-default versions)
        run: |
          set -euo pipefail
          POLICY_ARN="arn:aws:iam::${{ steps.ident.outputs.account_id }}:policy/$POLICY_NAME"
          if aws iam get-policy --policy-arn "$POLICY_ARN" >/dev/null 2>&1; then
            for v in $(aws iam list-policy-versions --policy-arn "$POLICY_ARN" --query 'Versions[?!IsDefaultVersion].VersionId' --output text); do
              aws iam delete-policy-version --policy-arn "$POLICY_ARN" --version-id "$v"
            done
            aws iam delete-policy --policy-arn "$POLICY_ARN"
            echo "::notice::Deleted policy $POLICY_NAME."
          else
            echo "::notice::Policy $POLICY_NAME does not exist; skipping."
          fi

      - name: Reminder to scrub repo secrets
        run: |
          echo ""
          echo "═════════════════════════════════════════════════════════════════════"
          echo " Teardown complete. The following GitHub repo secrets are now stale:"
          echo ""
          echo "   AWS_ACCESS_KEY_ID                — point at a destroyed user"
          echo "   AWS_SECRET_ACCESS_KEY            — same"
          echo "   BOOTSTRAP_AWS_ACCESS_KEY_ID      — only needed for re-bootstrap"
          echo "   BOOTSTRAP_AWS_SECRET_ACCESS_KEY  — same"
          echo ""
          echo " Delete or rotate them in:"
          echo "   GitHub → Settings → Secrets and variables → Actions"
          echo "═════════════════════════════════════════════════════════════════════"
