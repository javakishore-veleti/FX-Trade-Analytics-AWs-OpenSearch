AWSTemplateFormatVersion: '2010-09-09'
Description: |
  FX Trade Analytics — single-region AWS OpenSearch Service domain. One stack
  per region; deploy by running this stack into the target region. The index
  pattern fx-trades-{region} lives inside the resulting domain. Designed for
  the cross-region OpenSearch UI demo where each regional deployment is
  identical and the UI in us-east-1 federates queries across them.

Parameters:
  Environment:
    Type: String
    Default: dev
    AllowedValues: [dev, stg, prod]

  RegionCode:
    Type: String
    Description: |
      Full AWS region code, e.g. us-east-1. Used in the domain name suffix and
      tags. The CloudFormation deployment region itself is implied by where
      this stack is created, so this parameter must match the deploy region.

  InstanceType:
    Type: String
    Default: t3.small.search
    AllowedValues:
      - t3.small.search
      - t3.medium.search
      - r6g.large.search
      - r6g.xlarge.search

  InstanceCount:
    Type: Number
    Default: 1
    MinValue: 1
    MaxValue: 10
    Description: Single-node for dev; bump for prod multi-AZ + replicas.

  EbsVolumeSizeGB:
    Type: Number
    Default: 10
    MinValue: 10
    MaxValue: 500

  EngineVersion:
    Type: String
    Default: OpenSearch_2.13

  MasterUsername:
    Type: String
    Default: fxadmin
    Description: |
      FGAC master user for OpenSearch Dashboards browser login. Stored in the
      domain's internal user database (no IAM/Cognito tie-in).

  MasterPassword:
    Type: String
    NoEcho: true
    MinLength: 8
    MaxLength: 128
    Description: |
      FGAC master password. AWS requires 8–128 chars with at least one
      uppercase, one lowercase, one number, and one special character.
      Sourced from the OPENSEARCH_MASTER_PASSWORD GitHub repo secret;
      never echoed in workflow logs (NoEcho: true).

Resources:
  Domain:
    Type: AWS::OpenSearchService::Domain
    Properties:
      # Naming: fxs-{env}-{region} — fits the 28-char OpenSearch domain limit
      # for all foreseeable region codes.
      DomainName: !Sub "fxs-${Environment}-${RegionCode}"
      EngineVersion: !Ref EngineVersion
      ClusterConfig:
        InstanceType: !Ref InstanceType
        InstanceCount: !Ref InstanceCount
        DedicatedMasterEnabled: false
        ZoneAwarenessEnabled: false
      EBSOptions:
        EBSEnabled: true
        VolumeType: gp3
        VolumeSize: !Ref EbsVolumeSizeGB
      EncryptionAtRestOptions:
        Enabled: true
      NodeToNodeEncryptionOptions:
        Enabled: true
      DomainEndpointOptions:
        EnforceHTTPS: true
        TLSSecurityPolicy: Policy-Min-TLS-1-2-2019-07
      # Fine-Grained Access Control (FGAC) — required so the OpenSearch
      # Dashboards URL accepts a browser login. Without FGAC, hitting
      # /_dashboards in a browser fails with 'User: anonymous is not
      # authorized' because the browser sends no SigV4 signature. With FGAC
      # + InternalUserDatabase, /_dashboards renders a username/password
      # login page that accepts the MasterUsername / MasterPassword below.
      # AWS requires the three encryption / TLS options above (EncryptionAt
      # RestOptions, NodeToNodeEncryptionOptions, EnforceHTTPS) to be enabled
      # before AdvancedSecurityOptions.Enabled can be true — already on.
      AdvancedSecurityOptions:
        Enabled: true
        InternalUserDatabaseEnabled: true
        MasterUserOptions:
          MasterUserName: !Ref MasterUsername
          MasterUserPassword: !Ref MasterPassword
      AccessPolicies:
        Version: '2012-10-17'
        Statement:
          # Network-level gate: allow any IAM principal in THIS account to
          # reach the domain endpoint. With FGAC enabled, fine-grained
          # per-action authorization is enforced by the FGAC layer (master
          # user, internal DB roles), not by this access policy. Identities
          # without es:ESHttp* in their IAM policy are still denied at the
          # IAM evaluation step before they even reach FGAC.
          - Effect: Allow
            Principal:
              AWS: !Sub "arn:aws:iam::${AWS::AccountId}:root"
            Action: es:*
            Resource: '*'
      Tags:
        - Key: Project
          Value: fx-trade-analytics
        - Key: Environment
          Value: !Ref Environment
        - Key: Region
          Value: !Ref RegionCode
        - Key: ManagedBy
          Value: cloudformation

Outputs:
  DomainName:
    Value: !Ref Domain
    Export:
      Name: !Sub "fx-${Environment}-opensearch-${RegionCode}-name"
  DomainEndpoint:
    Value: !GetAtt Domain.DomainEndpoint
    Export:
      Name: !Sub "fx-${Environment}-opensearch-${RegionCode}-endpoint"
  DomainArn:
    Value: !GetAtt Domain.Arn
    Export:
      Name: !Sub "fx-${Environment}-opensearch-${RegionCode}-arn"
