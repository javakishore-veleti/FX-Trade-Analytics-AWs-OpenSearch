databaseChangeLog:
  - changeSet:
      id: 002-create-currency-pair
      author: fx-team
      changes:
        - createTable:
            tableName: currency_pair
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: from_currency
                  type: VARCHAR(3)
                  constraints:
                    nullable: false
              - column:
                  name: to_currency
                  type: VARCHAR(3)
                  constraints:
                    nullable: false
              - column:
                  name: active
                  type: BOOLEAN
                  defaultValueBoolean: true
                  constraints:
                    nullable: false
        - addUniqueConstraint:
            tableName: currency_pair
            columnNames: from_currency, to_currency
            constraintName: uk_currency_pair_from_to
