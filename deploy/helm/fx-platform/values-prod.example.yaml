# Example production overrides for the umbrella chart. Copy to
# values-prod.yaml (gitignored if it carries secrets), tune, then:
#
#   helm dependency update ./deploy/helm/fx-platform
#   helm upgrade --install fx ./deploy/helm/fx-platform \
#     -f deploy/helm/fx-platform/values-prod.yaml \
#     --namespace fx --create-namespace

global:
  imageRegistry: 123456789012.dkr.ecr.us-east-1.amazonaws.com
  imageTag: "1.0.0"

fx-masterdata:
  enabled: true
  image:
    repository: 123456789012.dkr.ecr.us-east-1.amazonaws.com/fx-masterdata
    tag: "1.0.0"
  datasource:
    host: fx-prod-aurora.cluster-xxxx.us-east-1.rds.amazonaws.com
    port: 5432
    database: fxdb
    username: fxapp
    passwordSecretName: fx-masterdata-db
  aws:
    region: us-east-1
  serviceAccount:
    annotations:
      eks.amazonaws.com/role-arn: arn:aws:iam::123456789012:role/fx-masterdata-irsa

fx-trade-service:
  enabled: true
  image:
    repository: 123456789012.dkr.ecr.us-east-1.amazonaws.com/fx-trade-service
    tag: "1.0.0"
  replicaCount: 3
  kafka:
    bootstrapServers: b-1.fxprod.kafka.us-east-1.amazonaws.com:9092
  opensearch:
    source:
      type: masterdata
      masterdataUrl: http://fx-fx-masterdata.fx.svc.cluster.local:8083
  aws:
    region: us-east-1
  serviceAccount:
    annotations:
      eks.amazonaws.com/role-arn: arn:aws:iam::123456789012:role/fx-trade-service-irsa

fx-risk-service:
  enabled: true
  image:
    repository: 123456789012.dkr.ecr.us-east-1.amazonaws.com/fx-risk-service
    tag: "1.0.0"
  replicaCount: 3
  kafka:
    bootstrapServers: b-1.fxprod.kafka.us-east-1.amazonaws.com:9092

fx-opensearch-indexer:
  enabled: true
  image:
    repository: 123456789012.dkr.ecr.us-east-1.amazonaws.com/fx-opensearch-indexer
    tag: "1.0.0"
  replicaCount: 3
  kafka:
    bootstrapServers: b-1.fxprod.kafka.us-east-1.amazonaws.com:9092
  opensearch:
    source:
      type: masterdata
      masterdataUrl: http://fx-fx-masterdata.fx.svc.cluster.local:8083
  aws:
    region: us-east-1
  serviceAccount:
    annotations:
      eks.amazonaws.com/role-arn: arn:aws:iam::123456789012:role/fx-opensearch-indexer-irsa
