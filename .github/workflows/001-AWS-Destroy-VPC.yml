name: 001-AWS-Destroy-VPC

# Tears down the VPC CloudFormation stack in each selected region. Regions
# whose VPC was supplied as an override (i.e. NOT created by this workflow)
# are skipped — we never delete what we didn't create.
# Refuses to run unless the literal token DESTROY is supplied.

on:
  workflow_dispatch:
    inputs:
      regions:
        description: 'Comma-separated AWS regions to destroy. Available: us-east-1 (N.Virginia), us-west-2 (Oregon), sa-east-1 (São Paulo), eu-west-2 (London), eu-central-1 (Frankfurt), ap-south-1 (Mumbai), ap-southeast-1 (Singapore), ap-northeast-1 (Tokyo). Ignored when "select_all_regions" is checked.'
        required: true
        default: 'us-east-1'
      select_all_regions:
        description: 'Check to destroy all 8 demo regions: us-east-1, us-west-2, sa-east-1, eu-west-2, eu-central-1, ap-south-1, ap-southeast-1, ap-northeast-1. Overrides the regions field above.'
        required: false
        default: false
        type: boolean
      environment:
        description: 'Environment to destroy'
        required: true
        default: 'dev'
        type: choice
        options: [dev, stg, prod]
      vpc_overrides_json:
        description: 'JSON map of region -> existing VPC id (those regions are SKIPPED — we never delete a supplied VPC). Example: {"us-east-1":"vpc-abc123"}'
        required: false
        default: '{}'
      confirm:
        description: 'Type DESTROY to confirm. Anything else aborts.'
        required: true
        default: ''
  workflow_call:
    inputs:
      regions:            { required: true,  type: string }
      select_all_regions: { required: false, type: boolean, default: false }
      environment:        { required: true,  type: string }
      vpc_overrides_json: { required: false, type: string, default: '{}' }
      confirm:            { required: true,  type: string }

permissions:
  contents: read

jobs:
  parse-regions:
    runs-on: ubuntu-latest
    outputs:
      regions_json: ${{ steps.parse.outputs.regions_json }}
    steps:
      - name: Verify confirmation token
        run: |
          if [ "${{ inputs.confirm }}" != "DESTROY" ]; then
            echo "::error::Refusing to destroy. You must type DESTROY in the confirm input."
            exit 1
          fi
      - id: parse
        run: |
          set -euo pipefail
          ALL='us-east-1,us-west-2,sa-east-1,eu-west-2,eu-central-1,ap-south-1,ap-southeast-1,ap-northeast-1'
          if [ "${{ inputs.select_all_regions }}" = "true" ]; then
            INPUT="$ALL"
            echo "::warning::select_all_regions is checked — destroying VPCs in every demo region. Hope that was intended."
          elif [ "${{ inputs.regions }}" = "all" ]; then
            INPUT="$ALL"
          else
            INPUT='${{ inputs.regions }}'
          fi
          ARR=$(echo "$INPUT" | tr ',' '\n' | sed 's/^[[:space:]]*//;s/[[:space:]]*$//' | grep . | jq -R . | jq -sc .)
          echo "Selected regions for destroy: $ARR"
          echo '${{ inputs.vpc_overrides_json }}' | jq empty
          echo "regions_json=$ARR" >> "$GITHUB_OUTPUT"

  destroy-vpc:
    needs: parse-regions
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        region: ${{ fromJson(needs.parse-regions.outputs.regions_json) }}
    env:
      STACK_NAME: fx-${{ inputs.environment }}-vpc
    steps:
      - name: Configure AWS credentials for ${{ matrix.region }}
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ matrix.region }}

      - name: Skip if region was an override
        id: lookup
        run: |
          set -euo pipefail
          OVR=$(echo '${{ inputs.vpc_overrides_json }}' | jq -r --arg r '${{ matrix.region }}' '.[$r] // ""')
          if [ -n "$OVR" ]; then
            echo "::notice::Region ${{ matrix.region }} VPC ($OVR) was user-supplied — NOT deleting."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Skip if no managed stack exists
        if: steps.lookup.outputs.skip == 'false'
        id: precheck
        run: |
          set -euo pipefail
          if aws cloudformation describe-stacks --stack-name "$STACK_NAME" --region "${{ matrix.region }}" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "::notice::No CFN stack $STACK_NAME found in ${{ matrix.region }}; nothing to destroy."
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Delete VPC stack in ${{ matrix.region }}
        if: steps.lookup.outputs.skip == 'false' && steps.precheck.outputs.exists == 'true'
        run: |
          set -euo pipefail
          echo "Deleting stack $STACK_NAME in ${{ matrix.region }} ..."
          aws cloudformation delete-stack --stack-name "$STACK_NAME" --region "${{ matrix.region }}"
          aws cloudformation wait stack-delete-complete --stack-name "$STACK_NAME" --region "${{ matrix.region }}" || {
            echo "::error::Stack delete did not complete cleanly in ${{ matrix.region }}. Check the AWS console."
            exit 1
          }
          echo "Stack $STACK_NAME deleted in ${{ matrix.region }}."
