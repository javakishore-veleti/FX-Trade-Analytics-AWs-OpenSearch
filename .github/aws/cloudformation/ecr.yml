AWSTemplateFormatVersion: '2010-09-09'
Description: |
  FX Trade Analytics — ECR repositories, one per Spring Boot service.
  Image scanning on push, lifecycle policy keeps the last 10 images per repo.

Parameters:
  Environment:
    Type: String
    Default: dev
    AllowedValues: [dev, stg, prod]

  ImageRetentionCount:
    Type: Number
    Default: 10
    MinValue: 1
    MaxValue: 100
    Description: Number of recent images to retain per repo; older are pruned.

Resources:
  TradeServiceRepo:
    Type: AWS::ECR::Repository
    Properties:
      RepositoryName: !Sub fx-${Environment}/trade-service
      ImageScanningConfiguration: { ScanOnPush: true }
      LifecyclePolicy:
        LifecyclePolicyText: !Sub |
          {
            "rules": [{
              "rulePriority": 1,
              "description": "Keep last ${ImageRetentionCount} images",
              "selection": {
                "tagStatus": "any",
                "countType": "imageCountMoreThan",
                "countNumber": ${ImageRetentionCount}
              },
              "action": { "type": "expire" }
            }]
          }
      Tags:
        - { Key: Environment, Value: !Ref Environment }

  RiskServiceRepo:
    Type: AWS::ECR::Repository
    Properties:
      RepositoryName: !Sub fx-${Environment}/risk-service
      ImageScanningConfiguration: { ScanOnPush: true }
      LifecyclePolicy:
        LifecyclePolicyText: !Sub |
          {
            "rules": [{
              "rulePriority": 1,
              "description": "Keep last ${ImageRetentionCount} images",
              "selection": {
                "tagStatus": "any",
                "countType": "imageCountMoreThan",
                "countNumber": ${ImageRetentionCount}
              },
              "action": { "type": "expire" }
            }]
          }
      Tags:
        - { Key: Environment, Value: !Ref Environment }

  IndexerRepo:
    Type: AWS::ECR::Repository
    Properties:
      RepositoryName: !Sub fx-${Environment}/opensearch-indexer
      ImageScanningConfiguration: { ScanOnPush: true }
      LifecyclePolicy:
        LifecyclePolicyText: !Sub |
          {
            "rules": [{
              "rulePriority": 1,
              "description": "Keep last ${ImageRetentionCount} images",
              "selection": {
                "tagStatus": "any",
                "countType": "imageCountMoreThan",
                "countNumber": ${ImageRetentionCount}
              },
              "action": { "type": "expire" }
            }]
          }
      Tags:
        - { Key: Environment, Value: !Ref Environment }

  MasterDataRepo:
    Type: AWS::ECR::Repository
    Properties:
      RepositoryName: !Sub fx-${Environment}/masterdata-service
      ImageScanningConfiguration: { ScanOnPush: true }
      LifecyclePolicy:
        LifecyclePolicyText: !Sub |
          {
            "rules": [{
              "rulePriority": 1,
              "description": "Keep last ${ImageRetentionCount} images",
              "selection": {
                "tagStatus": "any",
                "countType": "imageCountMoreThan",
                "countNumber": ${ImageRetentionCount}
              },
              "action": { "type": "expire" }
            }]
          }
      Tags:
        - { Key: Environment, Value: !Ref Environment }

Outputs:
  TradeServiceRepoUri:
    Value: !GetAtt TradeServiceRepo.RepositoryUri
    Export:
      Name: !Sub "fx-${Environment}-ecr-trade-service"
  RiskServiceRepoUri:
    Value: !GetAtt RiskServiceRepo.RepositoryUri
    Export:
      Name: !Sub "fx-${Environment}-ecr-risk-service"
  IndexerRepoUri:
    Value: !GetAtt IndexerRepo.RepositoryUri
    Export:
      Name: !Sub "fx-${Environment}-ecr-indexer"
  MasterDataRepoUri:
    Value: !GetAtt MasterDataRepo.RepositoryUri
    Export:
      Name: !Sub "fx-${Environment}-ecr-masterdata"
