# Example production overrides. Copy to values-prod.yaml (gitignored if you
# include real secret refs) and tune. Use this as the -f file in:
#
#   helm upgrade --install fx-masterdata ./deploy/helm/fx-masterdata \
#     -f values-prod.yaml \
#     --set image.tag=$(git rev-parse --short HEAD) \
#     --namespace fx --create-namespace

image:
  repository: 123456789012.dkr.ecr.us-east-1.amazonaws.com/fx-masterdata
  tag: "1.0.0"
  pullPolicy: IfNotPresent

datasource:
  host: fx-prod-aurora.cluster-xxxx.us-east-1.rds.amazonaws.com
  port: 5432
  database: fxdb
  username: fxapp
  passwordSecretName: fx-masterdata-db    # Create with:
                                          # kubectl create secret generic fx-masterdata-db \
                                          #   --from-literal=password='****' -n fx

aws:
  region: us-east-1
  # Use IRSA — leave credentialsSecretName unset, set the role-arn annotation below.
  credentialsSecretName: ""

replicaCount: 3

resources:
  requests: { cpu: 250m, memory: 768Mi }
  limits:   { cpu: 1,   memory: 1.5Gi }

serviceAccount:
  create: true
  annotations:
    eks.amazonaws.com/role-arn: arn:aws:iam::123456789012:role/fx-masterdata-irsa
