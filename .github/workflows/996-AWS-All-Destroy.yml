name: 996-AWS-All-Destroy

# Orchestrator: tears everything down in REVERSE order of creation
# (apps first, foundations last). All children require the literal token
# 'DESTROY' in the confirm input — this workflow forwards it.
# Add new steps in reverse order of their setup numbers.

on:
  workflow_dispatch:
    inputs:
      regions:
        description: 'Comma-separated AWS regions for VPC + OpenSearch destroy. Available: us-east-1 (N.Virginia), us-west-2 (Oregon), sa-east-1 (São Paulo), eu-west-2 (London), eu-central-1 (Frankfurt), ap-south-1 (Mumbai), ap-southeast-1 (Singapore), ap-northeast-1 (Tokyo). Ignored when "select_all_regions" is checked.'
        required: true
        default: 'us-east-1'
      select_all_regions:
        description: 'Check to destroy all 8 demo regions: us-east-1, us-west-2, sa-east-1, eu-west-2, eu-central-1, ap-south-1, ap-southeast-1, ap-northeast-1. Overrides the regions field above.'
        required: false
        default: false
        type: boolean
      home_region:
        description: 'Home region for global resources (IAM, ECR)'
        required: true
        default: 'us-east-1'
      environment:
        description: 'Environment to tear down'
        required: true
        default: 'dev'
        type: choice
        options: [dev, stg, prod]
      confirm:
        description: 'Type DESTROY to confirm. Forwarded to every child workflow.'
        required: true
        default: ''
      vpc_overrides_json:
        description: 'JSON map of region -> VPC id that was user-supplied (those regions are SKIPPED on destroy)'
        required: false
        default: '{}'
      purge_ecr_images:
        description: 'Purge ECR images before deleting the ECR stack?'
        required: false
        default: 'true'
        type: choice
        options: ['true', 'false']

permissions:
  contents: read

jobs:
  opensearch:
    uses: ./.github/workflows/004-AWS-Destroy-Region-OpenSearch.yml
    secrets: inherit
    with:
      regions: ${{ inputs.regions }}
      select_all_regions: ${{ inputs.select_all_regions }}
      environment: ${{ inputs.environment }}
      confirm: ${{ inputs.confirm }}

  ecr:
    needs: opensearch
    uses: ./.github/workflows/003-AWS-Destroy-ECR.yml
    secrets: inherit
    with:
      aws_region: ${{ inputs.home_region }}
      environment: ${{ inputs.environment }}
      confirm: ${{ inputs.confirm }}
      purge_images: ${{ inputs.purge_ecr_images }}

  iam-roles:
    needs: ecr
    uses: ./.github/workflows/002-AWS-Destroy-IAM-Roles.yml
    secrets: inherit
    with:
      aws_region: ${{ inputs.home_region }}
      environment: ${{ inputs.environment }}
      confirm: ${{ inputs.confirm }}

  vpc:
    needs: iam-roles
    uses: ./.github/workflows/001-AWS-Destroy-VPC.yml
    secrets: inherit
    with:
      regions: ${{ inputs.regions }}
      select_all_regions: ${{ inputs.select_all_regions }}
      environment: ${{ inputs.environment }}
      vpc_overrides_json: ${{ inputs.vpc_overrides_json }}
      confirm: ${{ inputs.confirm }}
