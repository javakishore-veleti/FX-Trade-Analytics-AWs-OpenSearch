apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "fx-masterdata.fullname" . }}
  labels: {{- include "fx-masterdata.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels: {{- include "fx-masterdata.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "fx-masterdata.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: api
    spec:
      serviceAccountName: {{ include "fx-masterdata.serviceAccountName" . }}
      {{- with .Values.image.pullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: app
          image: {{ include "fx-masterdata.image" . | quote }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args:
            # postgres,no-migrate — Liquibase OFF (migration Job ran first); web ON.
            - "--spring.profiles.active={{ include "fx-masterdata.podProfiles" . }}"
          ports:
            - name: http
              containerPort: {{ .Values.service.port }}
          env:
            - name: SPRING_DATASOURCE_URL
              value: "jdbc:postgresql://{{ .Values.datasource.host }}:{{ .Values.datasource.port }}/{{ .Values.datasource.database }}"
            - name: SPRING_DATASOURCE_USERNAME
              value: {{ .Values.datasource.username | quote }}
            - name: SPRING_DATASOURCE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.datasource.passwordSecretName }}
                  key: password
            - name: AWS_REGION
              value: {{ .Values.aws.region | quote }}
            {{- if .Values.aws.credentialsSecretName }}
            # Static AWS credentials Secret — only set if NOT using IRSA. With
            # IRSA the service account annotation drives auth and these are
            # left unset (DefaultCredentialsProvider picks up IRSA tokens).
            - name: FX_AWS_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.aws.credentialsSecretName }}
                  key: access-key
            - name: FX_AWS_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.aws.credentialsSecretName }}
                  key: secret-key
            {{- end }}
          livenessProbe:
            httpGet:
              path: {{ .Values.probes.liveness.path }}
              port: http
            initialDelaySeconds: {{ .Values.probes.liveness.initialDelaySeconds }}
            periodSeconds: {{ .Values.probes.liveness.periodSeconds }}
          readinessProbe:
            httpGet:
              path: {{ .Values.probes.readiness.path }}
              port: http
            initialDelaySeconds: {{ .Values.probes.readiness.initialDelaySeconds }}
            periodSeconds: {{ .Values.probes.readiness.periodSeconds }}
          resources: {{- toYaml .Values.resources | nindent 12 }}
