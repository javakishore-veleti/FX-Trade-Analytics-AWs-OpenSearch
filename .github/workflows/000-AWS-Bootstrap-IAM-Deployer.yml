name: 000-AWS-Bootstrap-IAM-Deployer

# One-time bootstrap of the IAM user that every other workflow in this repo
# authenticates as. Creates the Customer Managed Policy + IAM Group + IAM
# User + Group membership + a fresh access key. Idempotent on the first
# four; access keys are always newly minted (AWS doesn't rotate them
# in-place).
#
# ┌─────────────────────────────────────────────────────────────────────┐
# │ SECURITY MODEL                                                       │
# │                                                                      │
# │  This workflow needs ADMIN-level AWS credentials (they're used to    │
# │  create IAM resources). Those bootstrap credentials live in repo     │
# │  secrets named:                                                      │
# │     BOOTSTRAP_AWS_ACCESS_KEY_ID                                      │
# │     BOOTSTRAP_AWS_SECRET_ACCESS_KEY                                  │
# │                                                                      │
# │  The deployer access keys this workflow CREATES are written to the   │
# │  workflow logs ONCE. After you copy them into the regular            │
# │  AWS_ACCESS_KEY_ID + AWS_SECRET_ACCESS_KEY repo secrets, you SHOULD: │
# │     1) Delete this workflow run (Actions → run → ⋯ → Delete run)    │
# │     2) Delete the BOOTSTRAP_AWS_* secrets (no longer needed)         │
# │                                                                      │
# │  The bootstrap secrets are only needed for re-running this workflow  │
# │  if you ever need to recreate the IAM resources. Keeping them in the │
# │  repo permanently is unnecessary risk.                               │
# └─────────────────────────────────────────────────────────────────────┘

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type BOOTSTRAP to confirm. Any other value aborts.'
        required: true
        default: ''
      policy_name:
        description: 'IAM policy name'
        required: false
        default: 'fx-trade-opensearch-policy'
      group_name:
        description: 'IAM group name'
        required: false
        default: 'fx-trade-opensearch-deployers'
      user_name:
        description: 'IAM user name'
        required: false
        default: 'fx-trade-opensearch-github-deployer'
      aws_region:
        description: 'AWS region for the bootstrap CLI calls (IAM is global; any region works)'
        required: false
        default: 'us-east-1'

permissions:
  contents: read

jobs:
  bootstrap:
    runs-on: ubuntu-latest
    env:
      POLICY_FILE: .github/aws/configs/01-AWS-ThisRepo-AWSUser-Policies.json
      POLICY_NAME: ${{ inputs.policy_name }}
      GROUP_NAME:  ${{ inputs.group_name }}
      USER_NAME:   ${{ inputs.user_name }}
    steps:
      - name: Verify confirmation token
        run: |
          if [ "${{ inputs.confirm }}" != "BOOTSTRAP" ]; then
            echo "::error::Refusing to run. Type BOOTSTRAP in the confirm input."
            exit 1
          fi

      - uses: actions/checkout@v4

      - name: Verify bootstrap secrets are set
        env:
          BS_KEY_ID:     ${{ secrets.BOOTSTRAP_AWS_ACCESS_KEY_ID }}
          BS_SECRET_KEY: ${{ secrets.BOOTSTRAP_AWS_SECRET_ACCESS_KEY }}
        run: |
          if [ -z "$BS_KEY_ID" ] || [ -z "$BS_SECRET_KEY" ]; then
            echo "::error::Repo secrets BOOTSTRAP_AWS_ACCESS_KEY_ID and/or BOOTSTRAP_AWS_SECRET_ACCESS_KEY are not set."
            echo "::error::Add them in Settings → Secrets and variables → Actions, then re-run this workflow."
            echo "::error::These should be the access keys of an ADMIN AWS user (used only for this one-time bootstrap)."
            exit 1
          fi

      - name: Configure AWS credentials (bootstrap admin keys)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.BOOTSTRAP_AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.BOOTSTRAP_AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ inputs.aws_region }}

      - name: Resolve account id
        id: ident
        run: |
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          echo "account_id=$ACCOUNT_ID" >> "$GITHUB_OUTPUT"
          echo "Bootstrapping IAM in account $ACCOUNT_ID"

      - name: Create / verify Customer Managed Policy
        id: policy
        run: |
          set -euo pipefail
          POLICY_ARN="arn:aws:iam::${{ steps.ident.outputs.account_id }}:policy/$POLICY_NAME"
          if aws iam get-policy --policy-arn "$POLICY_ARN" >/dev/null 2>&1; then
            echo "::notice::Policy $POLICY_NAME already exists; updating to a new default version."
            # Push a new version so a re-run picks up any policy edits, and prune old versions to stay under the 5-version limit.
            for v in $(aws iam list-policy-versions --policy-arn "$POLICY_ARN" --query 'Versions[?!IsDefaultVersion].VersionId' --output text); do
              aws iam delete-policy-version --policy-arn "$POLICY_ARN" --version-id "$v"
            done
            aws iam create-policy-version \
              --policy-arn "$POLICY_ARN" \
              --policy-document "file://$POLICY_FILE" \
              --set-as-default >/dev/null
          else
            aws iam create-policy \
              --policy-name "$POLICY_NAME" \
              --policy-document "file://$POLICY_FILE" \
              --description "FX Trade Analytics — permissions for the GitHub Actions deployer (managed in this repo)" >/dev/null
            echo "::notice::Policy $POLICY_NAME created."
          fi
          echo "policy_arn=$POLICY_ARN" >> "$GITHUB_OUTPUT"

      - name: Create / verify IAM Group
        run: |
          set -euo pipefail
          if aws iam get-group --group-name "$GROUP_NAME" >/dev/null 2>&1; then
            echo "::notice::Group $GROUP_NAME already exists."
          else
            aws iam create-group --group-name "$GROUP_NAME" >/dev/null
            echo "::notice::Group $GROUP_NAME created."
          fi

      - name: Attach policy to group (idempotent)
        run: |
          aws iam attach-group-policy \
            --group-name "$GROUP_NAME" \
            --policy-arn "${{ steps.policy.outputs.policy_arn }}"
          echo "::notice::Policy attached to group $GROUP_NAME."

      - name: Create / verify IAM User
        run: |
          set -euo pipefail
          if aws iam get-user --user-name "$USER_NAME" >/dev/null 2>&1; then
            echo "::notice::User $USER_NAME already exists."
          else
            aws iam create-user --user-name "$USER_NAME" >/dev/null
            echo "::notice::User $USER_NAME created."
          fi

      - name: Add user to group (idempotent)
        run: |
          aws iam add-user-to-group --user-name "$USER_NAME" --group-name "$GROUP_NAME"
          echo "::notice::User $USER_NAME added to group $GROUP_NAME."

      - name: Generate access key for deployer user
        id: keys
        run: |
          set -euo pipefail
          # Refuse if the user already has 2 keys (AWS limit).
          EXISTING=$(aws iam list-access-keys --user-name "$USER_NAME" --query 'AccessKeyMetadata | length(@)' --output text)
          if [ "$EXISTING" -ge "2" ]; then
            echo "::error::User $USER_NAME already has 2 access keys (AWS limit). Delete one in the AWS console first, then re-run."
            exit 1
          fi
          if [ "$EXISTING" -ge "1" ]; then
            echo "::warning::User $USER_NAME already has 1 access key. Creating an additional one (you'll have 2). Rotate the old one when ready."
          fi

          KEYS_JSON=$(aws iam create-access-key --user-name "$USER_NAME")
          AKID=$(echo "$KEYS_JSON" | jq -r '.AccessKey.AccessKeyId')
          SAK=$(echo "$KEYS_JSON"  | jq -r '.AccessKey.SecretAccessKey')

          # Mask the secret in any subsequent log output (defence in depth).
          echo "::add-mask::$SAK"

          echo "akid=$AKID" >> "$GITHUB_OUTPUT"
          # The secret is intentionally NOT written as a step output (outputs persist
          # in the run summary). It's printed exactly once in the next step inside a
          # group block so you can copy it from the live log.

          # Stash the SAK in a runner-only env var that the next step echoes once.
          echo "SAK_FOR_DISPLAY<<EOF" >> "$GITHUB_ENV"
          echo "$SAK" >> "$GITHUB_ENV"
          echo "EOF" >> "$GITHUB_ENV"

      - name: Display new keys (copy NOW — this run should be deleted afterward)
        run: |
          echo ""
          echo "═════════════════════════════════════════════════════════════════════"
          echo " IAM bootstrap complete."
          echo ""
          echo " Add these two values as repo secrets in:"
          echo "   GitHub → Settings → Secrets and variables → Actions → New repository secret"
          echo ""
          echo "   AWS_ACCESS_KEY_ID       = ${{ steps.keys.outputs.akid }}"
          echo "   AWS_SECRET_ACCESS_KEY   = $SAK_FOR_DISPLAY"
          echo ""
          echo " AFTER copying:"
          echo "   1) Delete this workflow run from the Actions tab (⋯ → Delete run)"
          echo "      to scrub the secret from logs."
          echo "   2) Optionally delete the BOOTSTRAP_AWS_ACCESS_KEY_ID and"
          echo "      BOOTSTRAP_AWS_SECRET_ACCESS_KEY repo secrets — they are only"
          echo "      needed if you ever re-run this workflow."
          echo "═════════════════════════════════════════════════════════════════════"
