# ─────────────────────────────────────────────────────────────────────
# DEVELOPER-LOCAL SECRETS TEMPLATE
#
# 1. Don't copy by hand — run `npm run localhost:app:secrets:generate`.
#    The script reads FX_DEPLOYER_AWS_ACCESS_KEY_ID + _SECRET_ACCESS_KEY
#    (or the standard AWS_* env vars) and writes
#    ./application-local-secrets.yml at mode 600.
#    See `npm run localhost:app:secrets:help` for full usage.
#
# 2. The generated `application-local-secrets.yml` is gitignored —
#    never check it in.
#
# 3. In ECS / production, leave the file out and rely on the task IAM role
#    (DefaultCredentialsProvider picks it up automatically).
#
# ─── WHICH SERVICES READ THIS FILE ───────────────────────────────────
#
#   - fx-masterdata-service (port 9083)
#       → AWS OpenSearch domain & collection discovery
#         (Administration → OpenSearch (AWS) admin portal page)
#   - fx-trade-service (port 9080)
#       → SigV4 signing on the search path when an AWS backend is
#         configured in fx.opensearch.backends
#   - fx-opensearch-indexer (port 9082)
#       → SigV4 signing on the index/write path when an AWS backend is
#         configured in fx.opensearch.backends
#
# Each service's application.yml does:
#   spring.config.import: optional:file:./application-local-secrets.yml
#
# Run each service from the repo root so the relative path resolves; the
# `npm run localhost:app:services:*` scripts already do this.
# ─────────────────────────────────────────────────────────────────────

fx:
  aws:
    # Deployer IAM user access keys (printed by `npm run localhost:app:aws:setup:iam-all`).
    # NOT the bootstrap admin keys.
    access-key: AKIA__REPLACE_ME__
    secret-key: __REPLACE_ME_SECRET__

    # Optional: override the regions the masterdata sync scans. Defaults to
    # the 8-region demo set in fx-masterdata-service application.yml.
    # regions:
    #   - us-east-1
    #   - eu-west-2
