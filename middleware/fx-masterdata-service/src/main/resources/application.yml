server:
  port: 8083

spring:
  application:
    name: fx-masterdata-service

  # Optionally import a developer-local file with AWS bootstrap credentials.
  # The file is gitignored — see application-local-secrets-template.yml for
  # the structure. The leading 'optional:' means missing-file is OK in
  # environments that get credentials another way (env vars, ECS task role).
  config:
    import: 'optional:file:./application-local-secrets.yml'

  # Default profile = H2 in-memory (zero infra). Use --spring.profiles.active=postgres to switch.
  datasource:
    url: jdbc:h2:mem:fxmasterdata;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
    driver-class-name: org.h2.Driver
    username: sa
    password:

  # Liquibase owns the schema and seed data — Hibernate just maps to it.
  # NOTE: lock-wait + poll-rate tuning (for prod multi-pod EKS) is NOT done
  # here — Spring Boot's LiquibaseProperties has ignoreUnknownFields=false
  # and does not expose those keys. To configure them, define a SpringLiquibase
  # @Bean programmatically in a @Configuration class:
  #   bean.setChangeLogLockWaitTime(5);    // minutes
  #   bean.setChangeLogLockPollRate(5);    // seconds
  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.yaml
    enabled: true

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

  h2:
    console:
      enabled: true
      path: /h2-console

management:
  endpoints:
    web:
      exposure:
        include: prometheus, health, info
  endpoint:
    prometheus:
      enabled: true

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: alpha
    tags-sorter: alpha

# AWS settings used by the OpenSearch deployment sync feature
# (POST /api/admin/opensearch-deployments/sync). Credentials are picked up
# from application-local-secrets.yml when present (see template); otherwise
# the AWS SDK falls back to the default chain (env vars, ~/.aws/credentials,
# ECS task role, etc.).
fx:
  aws:
    regions:
      - us-east-1
      - us-west-2
      - sa-east-1
      - eu-west-2
      - eu-central-1
      - ap-south-1
      - ap-southeast-1
      - ap-northeast-1
    # access-key + secret-key intentionally NOT set here.
    # Override via application-local-secrets.yml or env vars.
    access-key:
    secret-key:

---
spring:
  config:
    activate:
      on-profile: postgres

  datasource:
    url: jdbc:postgresql://localhost:5432/fxdb
    driver-class-name: org.postgresql.Driver
    username: fxuser
    password: fxpass

  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: validate

  h2:
    console:
      enabled: false

# ─────────────────────────────────────────────────────────────────────
# migrate — one-shot Liquibase runner. Disables the web context so the
# JVM exits as soon as the changelog finishes. Used by:
#   - npm run localhost:app:postgres:migrate (local one-shot)
#   - Kubernetes pre-upgrade Job (production multi-pod story)
# Combine with another profile that supplies a real datasource, e.g.
#   --spring.profiles.active=postgres,migrate
# H2 + migrate is meaningless because H2 in-memory DBs die with the JVM,
# so the resulting schema can't be observed by any other process.
# ─────────────────────────────────────────────────────────────────────
---
spring:
  config:
    activate:
      on-profile: migrate

  main:
    web-application-type: none

  liquibase:
    enabled: true

# ─────────────────────────────────────────────────────────────────────
# no-migrate — Liquibase OFF. For service pods that boot AFTER an
# external migration runner (Job / Helm hook) has already applied the
# changelog. Hibernate stays at ddl-auto: validate so any drift between
# the deployed JAR's entities and the live schema fails the boot fast.
# Combine with the datasource profile, e.g.
#   --spring.profiles.active=postgres,no-migrate
# Local-dev Postgres single-pod can stay on bare `postgres` (Liquibase on)
# — no-migrate is for the multi-pod EKS deployment topology.
# ─────────────────────────────────────────────────────────────────────
---
spring:
  config:
    activate:
      on-profile: no-migrate

  liquibase:
    enabled: false
