apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "fx-opensearch-indexer.fullname" . }}
  labels: {{- include "fx-opensearch-indexer.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels: {{- include "fx-opensearch-indexer.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "fx-opensearch-indexer.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: worker
    spec:
      serviceAccountName: {{ include "fx-opensearch-indexer.serviceAccountName" . }}
      {{- with .Values.image.pullSecrets }}
      imagePullSecrets: {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: app
          image: {{ include "fx-opensearch-indexer.image" . | quote }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          {{- with (include "fx-opensearch-indexer.profiles" .) }}
          args:
            - "--spring.profiles.active={{ . }}"
          {{- end }}
          ports:
            - name: http
              containerPort: {{ .Values.service.port }}
          env:
            - name: SPRING_KAFKA_BOOTSTRAP_SERVERS
              value: {{ .Values.kafka.bootstrapServers | quote }}
            - name: FX_OPENSEARCH_SOURCE_TYPE
              value: {{ .Values.opensearch.source.type | quote }}
            - name: FX_OPENSEARCH_SOURCE_MASTERDATA_URL
              value: {{ .Values.opensearch.source.masterdataUrl | quote }}
            - name: FX_OPENSEARCH_SOURCE_TTL_SECONDS
              value: {{ .Values.opensearch.source.ttlSeconds | quote }}
            - name: AWS_REGION
              value: {{ .Values.aws.region | quote }}
            {{- if .Values.aws.credentialsSecretName }}
            - name: FX_AWS_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.aws.credentialsSecretName }}
                  key: access-key
            - name: FX_AWS_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.aws.credentialsSecretName }}
                  key: secret-key
            {{- end }}
          livenessProbe:
            httpGet:
              path: {{ .Values.probes.liveness.path }}
              port: http
            initialDelaySeconds: {{ .Values.probes.liveness.initialDelaySeconds }}
            periodSeconds: {{ .Values.probes.liveness.periodSeconds }}
          readinessProbe:
            httpGet:
              path: {{ .Values.probes.readiness.path }}
              port: http
            initialDelaySeconds: {{ .Values.probes.readiness.initialDelaySeconds }}
            periodSeconds: {{ .Values.probes.readiness.periodSeconds }}
          resources: {{- toYaml .Values.resources | nindent 12 }}
