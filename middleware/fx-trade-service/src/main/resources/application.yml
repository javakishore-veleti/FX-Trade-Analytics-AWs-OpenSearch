
spring:
  # Optional developer-local AWS credentials file. Generated by
  # `npm run local:app:generate-app-secrets-yaml`; gitignored. Same file is
  # imported by fx-masterdata-service and fx-opensearch-indexer so all three
  # services share one credentials source. Missing file is fine — the AWS
  # SDK falls back to its default credentials chain.
  config:
    import: 'optional:file:./application-local-secrets.yml'
  kafka:
    bootstrap-servers: localhost:9092
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      # Code in TradeProducer manually JSON-encodes via Jackson, so the wire format is plain UTF-8 string.
      # Using JsonSerializer here would double-encode (string -> "\"...\"") and break consumers.
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
server:
  port: 9080

management:
  endpoints:
    web:
      exposure:
        include: prometheus
  endpoint:
    prometheus:
      enabled: true

app:
  kafka:
    topic: trade-events

masterdata:
  base-url: http://localhost:9083
  allow-list:
    # When true, allow trades through if the master-data service is unreachable.
    # Flip to false in prod once masterdata is a hard dependency.
    fail-open: true
    refresh-interval-seconds: 300

# Region → backend URL map. The customer portal fetches this from
# GET /api/config/regions and posts each trade to the URL for the
# selected region. In local dev every region resolves to this same
# trade-service. In AWS, override per regional deployment, e.g.:
#
#   FX_REGIONS_ENDPOINTS_US_EAST_1=https://trades.us-east-1.example.com
#
# The dropdown in the customer portal is built from this map's keys,
# so adding a region here makes it appear in the UI.
fx:
  regions:
    endpoints:
      us-east-1: http://localhost:9080
      us-west-2: http://localhost:9080
      eu-west-1: http://localhost:9080
      ap-south-1: http://localhost:9080
  cors:
    allowed-origins:
      - http://localhost:4200
      - http://localhost:4201
  # OpenSearch backends per region. Search hits the domain matching the
  # request's `region` parameter; index name is fx-trades-{region}. Same
  # block must exist in fx-opensearch-indexer/application.yml so writes
  # and reads route to the same endpoints.
  opensearch:
    # Where the search client pulls its backend list from.
    #   yaml       — the static `backends:` list below (default; safe for local dev)
    #   masterdata — call fx-masterdata-service /api/admin/opensearch-deployments
    #                and use ACTIVE managed domains. Refreshed every ttl-seconds.
    # In AWS, set type: masterdata so the admin sync flow drives runtime backends.
    source:
      type: yaml
      masterdata-url: http://localhost:9083
      ttl-seconds: 60
    backends:
      - region: us-east-1
        provider: local
        endpoint: http://localhost:9200
      # AWS-OpenSearch-from-laptop example (uncomment + fill with real domain
      # endpoints from your `004-AWS-Setup-Region-OpenSearch` workflow output):
      # - region: us-east-1
      #   provider: aws
      #   endpoint: https://fxs-dev-us-east-1-XXXXXX.us-east-1.es.amazonaws.com
      # - region: eu-west-2
      #   provider: aws
      #   endpoint: https://fxs-dev-eu-west-2-YYYYYY.eu-west-2.es.amazonaws.com
